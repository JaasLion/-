
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { font-family: var(--font-sans); }
.header { padding: 1.25rem 1.25rem 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
.header h1 { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
.header p { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; line-height: 1.5; }

.tabs { display: flex; gap: 4px; padding: 0.875rem 1.25rem 0; border-bottom: 0.5px solid var(--color-border-tertiary); overflow-x: auto; }
.tab { padding: 6px 13px; font-size: 12px; color: var(--color-text-secondary); border-radius: var(--border-radius-md) var(--border-radius-md) 0 0; cursor: pointer; white-space: nowrap; border: 0.5px solid transparent; border-bottom: none; transition: all 0.15s; }
.tab:hover { background: var(--color-background-secondary); }
.tab.active { color: var(--color-text-primary); font-weight: 500; background: var(--color-background-primary); border-color: var(--color-border-tertiary); border-bottom: 2px solid var(--color-background-primary); margin-bottom: -1px; }

.panel { display: none; padding: 1.25rem; }
.panel.active { display: block; }

.sec { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; }
.sub { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 1rem; line-height: 1.5; }
.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 1.25rem 0; }

/* Timer urgency banner */
.urgency-bar { background: var(--color-background-danger); border-radius: var(--border-radius-lg); padding: 12px 16px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; }
.urgency-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--color-text-danger); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.urgency-icon span { color: white; font-size: 14px; }
.urgency-text strong { font-size: 13px; font-weight: 500; color: var(--color-text-danger); display: block; }
.urgency-text p { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; line-height: 1.5; }

/* Speed table */
.speed-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 1.25rem; }
.speed-table th { text-align: left; padding: 8px 10px; font-weight: 500; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
.speed-table td { padding: 9px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); vertical-align: middle; line-height: 1.5; }
.speed-table tr:last-child td { border: none; }
.pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
.p-green { background: var(--color-background-success); color: var(--color-text-success); }
.p-amber { background: var(--color-background-warning); color: var(--color-text-warning); }
.p-red { background: var(--color-background-danger); color: var(--color-text-danger); }
.p-gray { background: var(--color-background-secondary); color: var(--color-text-tertiary); }

/* Source cards */
.src-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.src-card { padding: 13px 14px; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
.src-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; color: var(--color-text-tertiary); margin-bottom: 5px; }
.src-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.src-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; }

/* WA bubbles */
.wa-block { margin-bottom: 1rem; }
.wa-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 7px; }
.wa-bubble { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 13px 15px; font-size: 13px; color: var(--color-text-primary); line-height: 1.85; border: 0.5px solid var(--color-border-tertiary); }
.wa-note { font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; line-height: 1.5; padding-left: 10px; border-left: 2px solid var(--color-border-secondary); font-style: italic; }

/* Stage */
.stage { margin-bottom: 1.1rem; }
.stage-header { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.stage-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
.n-red { background: var(--color-background-danger); color: var(--color-text-danger); }
.n-amber { background: var(--color-background-warning); color: var(--color-text-warning); }
.n-green { background: var(--color-background-success); color: var(--color-text-success); }
.n-blue { background: var(--color-background-info); color: var(--color-text-info); }
.n-purple { background: #EEEDFE; color: #534AB7; }
.stage-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.stage-time { font-size: 11px; color: var(--color-text-tertiary); margin-left: auto; white-space: nowrap; }

.say-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-left: 3px solid #185FA5; border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; padding: 11px 13px; margin-bottom: 7px; }
.say-tag { font-size: 10px; color: #185FA5; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: 5px; }
.say-body { font-size: 13px; color: var(--color-text-primary); line-height: 1.8; }
.say-body em { color: var(--color-text-secondary); font-size: 12px; font-style: normal; }

.tip-card { background: var(--color-background-warning); border-radius: var(--border-radius-md); padding: 9px 12px; margin-bottom: 7px; }
.tip-tag { font-size: 10px; color: var(--color-text-warning); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: 4px; }
.tip-body { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; }

.goal-card { background: var(--color-background-success); border-radius: var(--border-radius-md); padding: 9px 12px; margin-bottom: 7px; }
.goal-tag { font-size: 10px; color: var(--color-text-success); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: 4px; }
.goal-body { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; }

/* Q list */
.q-list { list-style: none; }
.q-item { padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; gap: 10px; }
.q-item:last-child { border: none; }
.q-num { font-size: 11px; color: var(--color-text-tertiary); width: 20px; flex-shrink: 0; padding-top: 2px; }
.q-main { font-size: 13px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 3px; }
.q-why { font-size: 11px; color: var(--color-text-tertiary); line-height: 1.5; }

/* Objections */
.obj-card { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 9px; }
.obj-header { background: var(--color-background-secondary); padding: 10px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.obj-q { font-size: 13px; color: var(--color-text-primary); font-weight: 500; }
.obj-arr { font-size: 11px; color: var(--color-text-tertiary); transition: transform 0.2s; }
.obj-arr.open { transform: rotate(180deg); }
.obj-body { display: none; padding: 12px 14px; border-top: 0.5px solid var(--color-border-tertiary); }
.obj-body.open { display: block; }
.obj-ans { font-size: 13px; color: var(--color-text-primary); line-height: 1.8; margin-bottom: 7px; }
.obj-tip { font-size: 11px; color: var(--color-text-tertiary); font-style: italic; line-height: 1.5; border-left: 2px solid var(--color-border-secondary); padding-left: 8px; }

/* Flow diagram */
.flow { display: flex; flex-direction: column; gap: 0; }
.flow-row { display: flex; align-items: stretch; gap: 0; }
.flow-box { flex: 1; padding: 12px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); }
.flow-arrow-v { display: flex; justify-content: center; align-items: center; height: 28px; color: var(--color-text-tertiary); font-size: 16px; }
.flow-arrow-h { display: flex; align-items: center; padding: 0 6px; color: var(--color-text-tertiary); font-size: 14px; }
.flow-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: 4px; }
.flow-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; }
.flow-desc { font-size: 11px; color: var(--color-text-secondary); line-height: 1.5; }
.fb { background: var(--color-background-danger); border-color: var(--color-border-danger); }
.fb .flow-label { color: var(--color-text-danger); }
.fw { background: var(--color-background-warning); border-color: var(--color-border-warning); }
.fw .flow-label { color: var(--color-text-warning); }
.fg { background: var(--color-background-success); border-color: var(--color-border-success); }
.fg .flow-label { color: var(--color-text-success); }
.fi { background: var(--color-background-info); border-color: var(--color-border-info); }
.fi .flow-label { color: var(--color-text-info); }
.fn { background: var(--color-background-secondary); }
.fn .flow-label { color: var(--color-text-tertiary); }

/* Checklist */
.check-list { list-style: none; }
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; }
.check-item:last-child { border: none; }
.check-box { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--color-border-secondary); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.check-box.on { background: var(--color-background-success); border-color: var(--color-border-success); }
.check-box.on::after { content: '✓'; font-size: 11px; color: var(--color-text-success); }
.check-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.6; }
.check-text.done { color: var(--color-text-tertiary); text-decoration: line-through; }
</style>
